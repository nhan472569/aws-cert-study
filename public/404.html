<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Redirecting...</title>
        <script>
            // Encode the path into a query param and redirect to root
            const path = window.location.pathname;
            window.location.replace('/?redirect=' + encodeURIComponent(path));
        </script>
    </head>
    <body></body>
</html>
